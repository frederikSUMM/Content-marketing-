function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button className={`copy-btn${copied?" copied":""}`} onClick={() => {
      navigator.clipboard && navigator.clipboard.writeText(text);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    }}>{copied ? "✓ Copied" : "Copy Post"}</button>
  );
}

function LiPost({ post }) {
  const [exp, setExp] = useState(false);
  const preview = post.text.slice(0, 220);
  const hasMore = post.text.length > 220;
  const display = exp ? post.text : (hasMore ? preview + "…" : post.text);
  return (
    <div className="li-post">
      <div className="li-post-header">
        <div className="li-avatar" style={{background:post.avatarBg}}>{post.avatarInit}</div>
        <div>
          <div className="li-name">{post.author}</div>
          <div className="li-role">{post.role}</div>
          <div className="li-time">Now · 🌐</div>
        </div>
      </div>
      <div className="li-body">
        {display}
        {hasMore && <button className="see-more" onClick={() => setExp(!exp)}>{exp ? "…see less" : "…see more"}</button>}
      </div>
      {post.imageText && <div className="li-image">{post.imageText}</div>}
      <div className="li-reactions">
        {["👍 Like","💬 Comment","🔁 Repost","📤 Send"].map(r => <button key={r} className="li-react-btn">{r}</button>)}
      </div>
    </div>
  );
}

function Accordion({ items }) {
  const [open, setOpen] = useState(null);
  return (
    <div>
      {items.map((item, i) => (
        <div key={i} className="accordion-item">
          <button className={`accordion-header${open===i?" open":""}`} onClick={() => setOpen(open===i?null:i)}>
            <span className="accordion-title">{item.title}</span>
            <span style={{color:"#B5922A",fontWeight:700,fontSize:18}}>{open===i?"−":"+"}</span>
          </button>
          {open===i && <div className="accordion-body">{item.content}</div>}
        </div>
      ))}
    </div>
  );
}

          ].map((item,i) => (
            <div key={i} style={{display:"flex",gap:10,marginBottom:10}}>
              <span style={{fontSize:13,color:"#2C1810",lineHeight:1.45}}>{item}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function MetricsTab() {
  const topStats = [
    {label:"Follower Growth",target:"+15%/mo",when:"Months 1-6",color:"#B5922A"},
    {label:"Engagement Rate",target:"3–6%",when:"Per post",color:"#5C1A1A"},
    {label:"Profile Views",target:"↑ trend",when:"After each post",color:"#8A6E1A"},
    {label:"Sample Requests",target:"1+/mo",when:"From LinkedIn",color:"#5C1A1A"},
  ];
  const accItems = [
    {title:"Profile Visits from Target Companies",content:<div style={{fontSize:13.5,lineHeight:1.65}}>LinkedIn analytics shows who's viewing profiles. If the right companies (mid-large food manufacturers in savory/snacks/plant-based) are visiting after a post, that's a qualified signal. Check this within 48 hours of each post.</div>},
    {title:"Comments from Decision-Makers",content:<div style={{fontSize:13.5,lineHeight:1.65}}>A comment from an R&D director or innovation lead is worth 100 likes. Respond within 2 hours. Always. This is relationship-building, not broadcast media.</div>},
    {title:"DMs and Connection Requests",content:<div style={{fontSize:13.5,lineHeight:1.65}}>Track inbound DMs that reference a specific post. These are warm leads. Every month, count how many conversations started from LinkedIn vs. cold outreach. That ratio tells you if content is working.</div>},
    {title:"Sample Kit Requests from LinkedIn",content:<div style={{fontSize:13.5,lineHeight:1.65}}>The ultimate B2B LinkedIn metric. Ask every sample requester: "How did you find us?" If even 1–2/month come from LinkedIn within 6 months, the content program is working.</div>},
    {title:"Saves on Technical Posts",content:<div style={{fontSize:13.5,lineHeight:1.65}}>When someone saves a post, they're treating it as a resource. Track saves on the science and proof-point posts. High saves = content people trust enough to keep.</div>},
  ];
  return (
    <div>
      <div className="section-header">
        <div className="section-eyebrow">Success Framework</div>
        <h1 className="section-title">What Good Looks Like</h1>
        <p className="section-desc">LinkedIn metrics for a B2B ingredient company. What to track, what actually matters, and what's a vanity trap.</p>
      </div>
      <div className="grid-4" style={{marginBottom:32}}>
        {topStats.map((m,i) => (
          <div key={i} className="card stat-box" style={{borderTop:`3px solid ${m.color}`}}>
            <div className="stat-num" style={{color:m.color}}>{m.target}</div>
            <div className="stat-label">{m.label}</div>
            <div className="stat-sub">{m.when}</div>
          </div>
        ))}
      </div>
      <div className="grid-2" style={{gap:32}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#888",marginBottom:16}}>The Metrics That Actually Matter (B2B)</div>
          <Accordion items={accItems} />
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#888",marginBottom:16}}>What Not to Chase</div>
          <div className="card card-cream" style={{marginBottom:16}}>
            {[["Follower count","A scientist with 400 followers who comments on your post is more valuable than 4,000 follows from career coaches."],
              ["Likes from peers","Likes from other food startups feel good. DMs from R&D directors change the business."],
              ["Viral posts","A post with 50k impressions from general public does nothing for B2B sales. Targeted reach beats broad reach."],
              ["Posting frequency","3 great posts/week beats 7 mediocre ones. Quality signals expertise. Volume signals desperation."]
            ].map(([trap,why]) => (
              <div key={trap} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid rgba(181,146,42,0.2)"}}>
                <div style={{display:"flex",gap:8,marginBottom:4}}>
                  <span style={{color:"#5C1A1A",fontWeight:700}}>✗</span>
                  <span style={{fontSize:13.5,fontWeight:700,color:"#5C1A1A"}}>{trap}</span>
                </div>
                <div style={{fontSize:13,color:"#666",paddingLeft:20,lineHeight:1.5}}>{why}</div>
              </div>
            ))}
          </div>
          <div className="card card-gold" style={{color:"#F5EDD8"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",opacity:0.7,marginBottom:12}}>6-Month Milestone Targets</div>
            {["500+ followers across all 4 personal profiles",
              "3+ inbound conversations from target companies per month",
              "1 co-development inquiry traceable to LinkedIn",
              "At least 2 posts with 1,000+ impressions from qualified audience",
              "SUMM appearing in search results for 'fermented faba protein' and 'clean label umami'"
            ].map((m,i) => (
              <div key={i} style={{display:"flex",gap:10,marginBottom:10}}>
                <span style={{color:"#F5EDD8",fontWeight:700,flexShrink:0}}>✓</span>
                <span style={{fontSize:13,opacity:0.9,lineHeight:1.45}}>{m}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const TABS = [
  {id:"pillars",label:"Content Pillars"},
  {id:"posts",label:"Post Examples"},
  {id:"formulas",label:"Post Formulas"},
  {id:"voice",label:"Brand Voice"},
  {id:"calendar",label:"Content Calendar"},
  {id:"metrics",label:"What to Measure"},
];

function App() {
  const [tab, setTab] = useState("pillars");
  return (
    <div className="app">
      <div className="header">
        <div className="header-brand">
          <span className="header-summ">SUMM</span>
          <span className="header-sub">ingredients</span>
        </div>
        <div className="header-title">LinkedIn Content Framework</div>
      </div>
      <div className="nav">
        {TABS.map(t => (
          <button key={t.id} className={`nav-tab${tab===t.id?" active":""}`} onClick={() => setTab(t.id)}>{t.label}</button>
        ))}
      </div>
      <div className="main">
        {tab==="pillars" && <PillarsTab />}
        {tab==="posts" && <PostsTab />}
        {tab==="formulas" && <FormulasTab />}
        {tab==="voice" && <VoiceTab />}
        {tab==="calendar" && <CalendarTab />}
        {tab==="metrics" && <MetricsTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
